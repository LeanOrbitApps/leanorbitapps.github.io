<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Color Season Analysis AI</title>
<meta name="description" content="Find your color season with one selfie. Privacy policy and support for the Color Season Analysis AI iOS app.">
<style>
  :root {
    color-scheme: light dark;
    --bg: #ffffff;
    --text: #1d1d1f;
    --muted: #6e6e73;
    --accent: #b4468a;
    --card: #f5f5f7;
    --border: #e5e5ea;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1e;
      --text: #f5f5f7;
      --muted: #98989d;
      --accent: #e07ab8;
      --card: #2c2c2e;
      --border: #3a3a3c;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    background: var(--bg);
    color: var(--text);
    font: 17px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-align: center;
  }
  main { max-width: 34em; padding: 40px 20px; }
  .swatches { display: flex; justify-content: center; gap: 10px; margin-bottom: 22px; }
  .swatches span { width: 26px; height: 26px; border-radius: 50%; display: inline-block; }
  h1 { font-size: 1.8em; margin: 0 0 0.3em; }
  p { color: var(--muted); }
  .links { display: flex; justify-content: center; gap: 14px; margin-top: 28px; flex-wrap: wrap; }
  .links a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 600;
    padding: 12px 22px;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: var(--card);
  }
  footer { margin-top: 40px; color: var(--muted); font-size: 0.85em; }
  footer a { color: var(--muted); }
</style>
</head>
<body>
<main>
  <div class="swatches" aria-hidden="true">
    <span style="background:#7a1f3d"></span>
    <span style="background:#0f4c81"></span>
    <span style="background:#2e6f40"></span>
    <span style="background:#e8b4bc"></span>
    <span style="background:#f2c14e"></span>
  </div>
  <h1>Color Season Analysis AI</h1>
  <p>Find your color season with one selfie — your 10 best colors, your neutrals, the shades to skip, and a shareable draping reveal.</p>
  <div class="links">
    <a href="support.html">Support</a>
    <a href="privacy.html">Privacy Policy</a>
  </div>
  <footer>
    © 2026 Lean Orbit LLC · <a href="mailto:support@leanorbit.app">support@leanorbit.app</a>
  </footer>
</main>
</body>
</html>
